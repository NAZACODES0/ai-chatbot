<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot - Powered by Gemini</title>
    <link rel="stylesheet" href="chatbot-styles.css">
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="logo">
                <h1>🤖 AI Chat</h1>
            </div>
            <button class="new-chat-btn" onclick="startNewChat()">+ New Chat</button>
            <div class="chat-history" id="chatHistory"></div>
        </div>

        <div class="main-chat">
            <div class="chat-header">
                <h2>AI Chatbot</h2>
                <p>Powered by Google Gemini</p>
            </div>

            <div class="messages-container" id="messagesContainer">
                <div class="welcome-message">
                    <h2>Welcome to AI Chat</h2>
                    <p>Ask me anything! I can help with:</p>
                    <div class="suggestion-buttons">
                        <button onclick="sendMessage('Explain quantum computing')">Quantum Computing</button>
                        <button onclick="sendMessage('Write a short story')">Short Story</button>
                        <button onclick="sendMessage('How to learn programming?')">Programming Tips</button>
                        <button onclick="sendMessage('What is AI?')">About AI</button>
                    </div>
                </div>
            </div>

            <div class="api-key-section" id="apiKeySection">
                <input 
                    type="password" 
                    id="geminiApiKey" 
                    placeholder="Paste your Gemini API key here..."
                    class="api-input"
                >
                <button onclick="saveApiKey()" class="save-btn">Save API Key</button>
                <p id="keyStatus" class="key-status"></p>
            </div>

            <div class="chat-input-container">
                <textarea 
                    id="userInput" 
                    placeholder="Type your message here... (Press Shift+Enter for new line, Enter to send)"
                    class="chat-input"
                    disabled
                ></textarea>
                <button onclick="sendMessage()" class="send-btn" id="sendBtn" disabled>
                    ➤ Send
                </button>
            </div>
        </div>
    </div>

    <script src="chatbot-script.js"></script>
</body>
</html>
