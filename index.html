<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot - Gemini</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 600px;
            height: 90vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 20px 20px 0 0;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 5px;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            display: flex;
            gap: 10px;
            animation: slideIn 0.3s ease-out;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
            line-height: 1.5;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .message.bot .message-content {
            background: #f0f0f0;
            color: #333;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .typing {
            display: flex;
            gap: 5px;
            padding: 12px 16px;
            background: #f0f0f0;
            border-radius: 12px;
            width: fit-content;
        }

        .typing span {
            width: 8px;
            height: 8px;
            background: #999;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                opacity: 0.5;
            }
            30% {
                opacity: 1;
            }
        }

        .input-section {
            padding: 20px;
            border-top: 2px solid #eee;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .api-input {
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1em;
        }

        .api-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .chat-input {
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1em;
            font-family: inherit;
            resize: none;
            min-height: 50px;
        }

        .chat-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .status {
            font-size: 0.9em;
            padding: 8px;
            border-radius: 5px;
            text-align: center;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 AI Chat</h1>
            <p>Powered by Google Gemini</p>
        </div>

        <div class="messages" id="messages"></div>

        <div class="input-section">
            <input 
                type="password" 
                id="apiKey" 
                placeholder="Paste your Gemini API key..."
                class="api-input"
            >
            <div class="button-group">
                <button onclick="saveApiKey()">Save API Key</button>
                <button onclick="newChat()">New Chat</button>
            </div>
            <div id="status" class="status" style="display:none;"></div>

            <textarea 
                id="userInput" 
                placeholder="Type your message here..."
                class="chat-input"
                disabled
            ></textarea>
            <button onclick="sendMessage()" id="sendBtn" disabled>Send</button>
        </div>
    </div>

    <script>
        const GEMINI_API_URL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent';
        let apiKey = localStorage.getItem('geminiApiKey') || '';
        let chatHistory = [];

        if (apiKey) {
            enableChat();
            showStatus('✓ API Key loaded', 'success');
        }

        function saveApiKey() {
            const key = document.getElementById('apiKey').value.trim();
            if (!key) {
                showStatus('❌ Please enter an API key', 'error');
                return;
            }
            localStorage.setItem('geminiApiKey', key);
            apiKey = key;
            document.getElementById('apiKey').value = '';
            enableChat();
            showStatus('✓ API Key saved', 'success');
        }

        function enableChat() {
            document.getElementById('userInput').disabled = false;
            document.getElementById('sendBtn').disabled = false;
        }

        function showStatus(msg, type) {
            const status = document.getElementById('status');
            status.textContent = msg;
            status.className = `status ${type}`;
            status.style.display = 'block';
            setTimeout(() => status.style.display = 'none', 3000);
        }

        function newChat() {
            chatHistory = [];
            document.getElementById('messages').innerHTML = '';
        }

        async function sendMessage() {
            const input = document.getElementById('userInput').value.trim();
            if (!input || !apiKey) return;

            document.getElementById('userInput').value = '';

            // Add user message
            addMessage(input, 'user');
            chatHistory.push({ role: 'user', content: input });

            // Show typing indicator
            const typingId = 'typing-' + Date.now();
            const msg = document.createElement('div');
            msg.id = typingId;
            msg.className = 'message bot';
            msg.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
            document.getElementById('messages').appendChild(msg);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;

            try {
                const contents = chatHistory.map(m => ({
                    role: m.role === 'user' ? 'user' : 'model',
                    parts: [{ text: m.content }]
                }));

                const response = await fetch(`${GEMINI_API_URL}?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: contents,
                        generationConfig: { temperature: 0.7, maxOutputTokens: 2048 }
                    })
                });

                document.getElementById(typingId).remove();

                if (!response.ok) {
                    const error = await response.json();
                    addMessage('❌ Error: ' + (error.error?.message || 'API error'), 'bot');
                    return;
                }

                const data = await response.json();
                const botMsg = data.candidates[0].content.parts[0].text;
                addMessage(botMsg, 'bot');
                chatHistory.push({ role: 'bot', content: botMsg });

            } catch (error) {
                document.getElementById(typingId).remove();
                addMessage('❌ Error: ' + error.message, 'bot');
            }
        }

        function addMessage(text, role) {
            const msg = document.createElement('div');
            msg.className = `message ${role}`;
            const content = document.createElement('div');
            content.className = 'message-content';
            content.textContent = text;
            msg.appendChild(content);
            document.getElementById('messages').appendChild(msg);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }

        document.getElementById('userInput')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
